<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Oak Lodge Garden</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
:root{--bg:#141a10;--card:#1c2316;--border:#2e3628;--text:#e4e0d6;--muted:#8e8a7e;--green:#7cb342;--warm:#d4a373}
*{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:'DM Sans',sans-serif;min-height:100vh;-webkit-font-smoothing:antialiased}
h1,h2,h3{font-family:'DM Serif Display',serif;font-weight:400}
.hdr{text-align:center;padding:2.5rem 1rem 1.8rem}
.hdr h1{font-size:2.4rem}.hdr p{color:var(--muted);font-size:.85rem;text-transform:uppercase;letter-spacing:.08em;margin-top:.3rem}
.wrap{max-width:960px;margin:0 auto;padding:0 1rem 3rem}
.plan-card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.2rem;overflow:hidden}
.plan-label{font-size:.75rem;color:var(--green);text-transform:uppercase;letter-spacing:.1em;font-weight:500;margin-bottom:.8rem}
.plan-hint{font-size:.78rem;color:var(--muted);font-style:italic;margin-bottom:.8rem}
svg.gp{width:100%;height:auto}
svg.gp .zone{cursor:pointer;transition:filter .2s}
svg.gp .zone:hover{filter:brightness(1.3) drop-shadow(0 0 8px rgba(124,179,66,.5))}
svg.gp .zl{font-family:'DM Sans',sans-serif;font-weight:600;fill:#fff;pointer-events:none;text-anchor:middle;dominant-baseline:central;font-size:11px}
svg.gp .zs{font-family:'DM Sans',sans-serif;font-size:7.5px;fill:rgba(255,255,255,.45);pointer-events:none;text-anchor:middle}
.view{display:none}.view.active{display:block}
.back{display:inline-flex;align-items:center;gap:.4rem;color:var(--green);font-size:.85rem;cursor:pointer;margin-bottom:1rem;background:none;border:none;font-family:inherit}
.back:hover{text-decoration:underline}
.bed-hdr{margin-bottom:.8rem}.bed-hdr h2{font-size:1.8rem}
.badge{display:inline-block;padding:.2rem .6rem;border-radius:16px;font-size:.7rem;font-weight:500;text-transform:uppercase;letter-spacing:.05em;margin-top:.3rem}
.dims{display:flex;gap:.6rem;flex-wrap:wrap;margin-bottom:1rem}
.dim{background:rgba(124,179,66,.1);border:1px solid rgba(124,179,66,.2);padding:.25rem .6rem;border-radius:6px;font-size:.8rem;color:var(--green);font-weight:500}
.bed-desc{color:var(--muted);font-size:.9rem;line-height:1.6;margin-bottom:1.2rem}
.st{font-size:1.05rem;color:var(--warm);margin:.8rem 0 .5rem;display:flex;align-items:center;gap:.4rem}
.st::before{content:'';width:16px;height:2px;background:var(--warm)}
.map-card{background:var(--card);border:1px solid var(--border);border-radius:12px;padding:1rem;margin-bottom:.8rem}
.map-hint{font-size:.75rem;color:var(--muted);font-style:italic;margin-bottom:.5rem}
.plant-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(190px,1fr));gap:.5rem;margin-bottom:1rem}
.pc{background:var(--card);border:1px solid var(--border);border-radius:10px;padding:.6rem .8rem;cursor:pointer;transition:all .2s}
.pc:hover{border-color:var(--green);background:rgba(124,179,66,.08)}
.pc .pn{font-weight:500;font-size:.85rem}.pc .pl{font-size:.72rem;color:var(--muted);font-style:italic;margin-top:.1rem}
.gallery{display:grid;grid-template-columns:repeat(auto-fit,minmax(150px,1fr));gap:.5rem;margin-bottom:1rem}
.gallery img{width:100%;height:200px;object-fit:cover;border-radius:8px;border:1px solid var(--border);cursor:pointer;transition:transform .2s}
.gallery img:hover{transform:scale(1.02)}
.gd{font-size:.7rem;color:var(--muted);text-align:center;margin-top:.15rem}
.tl{background:rgba(212,163,115,.06);border:1px dashed rgba(212,163,115,.25);border-radius:10px;padding:.8rem;text-align:center;color:var(--muted);font-size:.8rem;font-style:italic}
.pd{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:1.5rem;margin-bottom:1rem}
.pd h2{margin-bottom:.2rem}.pd .lt{color:var(--muted);font-style:italic;font-size:.95rem;margin-bottom:1.2rem}
.ig{display:grid;grid-template-columns:1fr 1fr;gap:.8rem}
.ii{background:rgba(255,255,255,.03);border-radius:10px;padding:.8rem}
.ii h4{font-size:.68rem;text-transform:uppercase;letter-spacing:.08em;color:var(--green);margin-bottom:.3rem;font-weight:500}
.ii p{font-size:.83rem;line-height:1.5;color:var(--muted)}
@media(max-width:600px){.ig{grid-template-columns:1fr}}
.lb{display:none;position:fixed;inset:0;background:rgba(0,0,0,.95);z-index:2000;justify-content:center;align-items:center;cursor:pointer}
.lb.active{display:flex}.lb img{max-width:90vw;max-height:90vh;object-fit:contain;border-radius:6px}
footer{text-align:center;padding:1.5rem;color:var(--muted);font-size:.75rem}footer span{color:var(--green)}
</style>
</head>

<script>
const PHOTOS={"bed1": ["images/may-2026/bed1.jpg", "images/may-2026/bed1-close1.jpg", "images/may-2026/bed1-close2.jpg"], "bed2": ["images/may-2026/bed2-1.jpg", "images/may-2026/bed2-2.jpg", "images/may-2026/bed2-kitchen.jpg", "images/may-2026/bed2-steps.jpg", "images/may-2026/bed2-south1.jpg", "images/may-2026/bed2-south2.jpg"], "bed3": ["images/may-2026/bed3.jpg", "images/may-2026/bed3-detail.jpg"], "bed4": ["images/may-2026/bed4.jpg", "images/may-2026/bed4-wide.jpg"], "stoneBed": ["images/may-2026/stone-bed.jpg", "images/may-2026/stone-bed-wide.jpg", "images/may-2026/stone-bed-detail1.jpg", "images/may-2026/stone-bed-detail2.jpg"], "steps": ["images/may-2026/steps.jpg"], "patio": ["images/may-2026/patio.jpg", "images/may-2026/patio-door.jpg", "images/may-2026/patio-clematis.jpg"]};
const PLANTS={"Bed 1": [{"name": "Angel Wings", "latin": "Senecio candicans", "light": "Full sun", "water": "Well-drained soil; drought-tolerant.", "care": "Avoid getting water on the velvety leaves. Protect from hard frosts.", "seasonal": "Evergreen in mild areas. Offers stunning silver foliage mostly spring to autumn."}, {"name": "Astilbe", "latin": "Astilbe", "light": "Partial to full shade", "water": "Moist to wet soil; do not let dry out.", "care": "Leave dried flower heads for winter interest or cut back in autumn.", "seasonal": "Herbaceous perennial. Dies back in winter. Feathery flower plumes appear in summer."}, {"name": "Box Hedging", "latin": "Buxus sempervirens", "light": "Full sun to full shade.", "water": "Tolerates most well-drained soils. Water regularly when newly planted; established plants are fairly drought-tolerant.", "care": "Clip twice a year (late spring and late summer) to maintain a neat shape. Watch for box blight and box tree caterpillar.", "seasonal": "Evergreen. Retains dense, glossy green foliage year-round. Produces small insignificant flowers in spring."}, {"name": "English Daisy", "latin": "Bellis perennis", "light": "Full sun to partial shade.", "water": "Moist, well-drained soil. Water regularly.", "care": "Deadhead spent flowers to encourage continued blooming. Can self-seed freely.", "seasonal": "Short-lived perennial often grown as a biennial. Produces pink, red, or white pom-pom flowers from early spring through summer. May die back in hot summers."}, {"name": "Euonymus", "latin": "Euonymus fortunei (golden variety)", "light": "Full sun to partial shade.", "water": "Tolerates most soils; average watering.", "care": "Prune in spring to maintain shape. Can be used as ground cover or trained upwards.", "seasonal": "Evergreen. Keeps its bright golden-variegated foliage all year round. Colours may intensify in full sun."}, {"name": "Hosta (Plantain Lily)", "latin": "Hosta", "light": "Partial to full shade", "water": "Rich moist soil.", "care": "Watch out for slugs and snails!", "seasonal": "Herbaceous perennial. Dies back underground in winter. Lush leaves emerge in spring."}, {"name": "Japanese Aralia", "latin": "Fatsia japonica 'Spider''s Web'", "light": "Partial to full shade", "water": "Moist well-drained soil.", "care": "Protect from harsh cold winds.", "seasonal": "Evergreen. Keeps its speckled tropical leaves year-round."}, {"name": "Japanese Maple", "latin": "Acer palmatum", "light": "Dappled shade to partial sun.", "water": "Keep soil consistently moist but not waterlogged.", "care": "Slightly acidic, well-drained loam.", "seasonal": "Requires minimal pruning. Remove dead or crossing branches during the dormant winter season."}, {"name": "Rhododendron", "latin": "Rhododendron 'Goldflimmer'", "light": "Partial shade", "water": "Acidic (ericaceous) moist well-drained soil.", "care": "Deadhead carefully after flowering. Needs ericaceous compost/fertiliser.", "seasonal": "Evergreen. Keeps its variegated leaves all year. Blooms with purple flowers in late spring."}], "Bed 2": [{"name": "Angel Wings", "latin": "Senecio candicans", "light": "Full sun", "water": "Well-drained soil; drought-tolerant.", "care": "Avoid getting water on the velvety leaves. Protect from hard frosts.", "seasonal": "Evergreen in mild areas. Offers stunning silver foliage mostly spring to autumn."}, {"name": "Forget-me-not", "latin": "Myosotis", "light": "Partial shade.", "water": "Keep soil consistently moist.", "care": "Humus-rich, moisture-retentive soil.", "seasonal": "Pull up plants after flowering to prevent excessive self-seeding, or leave them if naturalising is desired."}, {"name": "Hosta (Plantain Lily)", "latin": "Hosta", "light": "Partial to full shade", "water": "Rich moist soil.", "care": "Watch out for slugs and snails!", "seasonal": "Herbaceous perennial. Dies back underground in winter. Lush leaves emerge in spring."}, {"name": "Maiden Pink", "latin": "Dianthus deltoides", "light": "Full sun", "water": "Well-drained neutral to alkaline soil.", "care": "Deadhead regularly to prolong flowering.", "seasonal": "Evergreen mat of foliage. Blooms with bright pink/red flowers in summer."}, {"name": "Nemesia", "latin": "Nemesiaspp.", "light": "Full sun to partial shade.", "water": "Regular; keep the soil moist but ensure it does not become soggy.", "care": "Rich, well-drained compost or soil.", "seasonal": "Trim the plant back slightly after the initial flush of flowers to encourage a second display."}, {"name": "Peony", "latin": "Paeonia lactiflora", "light": "Full sun to light shade", "water": "Rich well-drained soil; moderate watering.", "care": "Provide plant supports for heavy flower heads. Cut back dead foliage in late autumn.", "seasonal": "Herbaceous perennial. Dies back completely in winter. Huge blooms in late spring/early summer."}, {"name": "Silverbush", "latin": "Convolvulus cneorum", "light": "Full sun", "water": "Very well-drained soil; drought-tolerant.", "care": "Protect from severe winter wet and cold.", "seasonal": "Evergreen. Retains silver foliage year-round. Produces white/pink flowers in spring and summer."}, {"name": "Variegated Dogwood", "latin": "Cornus alba", "light": "Full sun to partial shade", "water": "Tolerates most soils even damp ones.", "care": "Prune hard (coppice) in late winter/early spring to encourage bright new stems.", "seasonal": "Deciduous. Drops leaves in autumn to reveal striking bright red winter stems."}, {"name": "Weeping Cherry", "latin": "Prunus\u00a0species", "light": "Full sun.", "water": "Needs moderately fertile, well-drained soil. Keep the ground consistently moist but avoid waterlogged conditions.", "care": "Prune during the dormant winter period only to remove dead, diseased, or crossing branches. Avoid disrupting the natural weeping form. Apply a balanced fertiliser in early spring.", "seasonal": "Deciduous. Exhibits prolific spring blossoms before or alongside leaf emergence. The canopy provides summer shade before leaves turn yellow or bronze and drop in autumn."}, {"name": "Weigela", "latin": "Weigela florida", "light": "Full sun to partial shade", "water": "Moist well-drained soil.", "care": "Prune immediately after flowering.", "seasonal": "Deciduous. Drops leaves in autumn. Blooms with trumpet flowers in late spring/early summer."}], "Bed 3": [{"name": "Apple Tree", "latin": "Malus domestica", "light": "Full sun.", "water": "Regular watering, particularly during fruit development.", "care": "Well-drained, fertile soil.", "seasonal": "Prune in late winter while dormant to maintain structure and encourage fruiting spurs."}, {"name": "Avens", "latin": "Geum", "light": "Full sun to partial shade", "water": "Moist but well-drained soil; water regularly.", "care": "Deadhead spent flowers to encourage more blooms.", "seasonal": "Herbaceous or semi-evergreen. Produces bright flowers from late spring through summer."}, {"name": "Wintercreeper", "latin": "Euonymus fortunei", "light": "Full sun to full shade", "water": "Tolerates most soils; average watering.", "care": "Prune in spring to maintain shape.", "seasonal": "Evergreen shrub. Keeps its bright variegated foliage all year round."}], "Bed 4": [{"name": "Lavender", "latin": "Lavandula angustifolia", "light": "Full sun.", "water": "Well-drained, poor to moderately fertile soil. Drought-tolerant once established.", "care": "Prune after flowering in late summer, cutting back to just above the woody growth. Do not cut into old wood.", "seasonal": "Evergreen. Grey-green aromatic foliage year-round. Produces fragrant purple flower spikes from mid to late summer. Attractive to bees and butterflies."}, {"name": "New Zealand Flax", "latin": "Phormium", "light": "Full sun to partial shade.", "water": "Moderate; keep evenly moist during the growing season.", "care": "Versatile; prefers well-drained conditions.", "seasonal": "Cut back old, damaged, or untidy leaves right to the base in spring."}, {"name": "Rose", "latin": "Rosa", "light": "Full sun.", "water": "Regular, deep watering at the base to avoid wetting the foliage.", "care": "Rich, well-drained, slightly acidic loam.", "seasonal": "Prune hard in late winter or early spring. Deadhead spent blooms regularly to encourage further flowering."}, {"name": "Wisteria", "latin": "Wisteriaspp.", "light": "Full sun.", "water": "Regular watering until a deep root system is established.", "care": "Well-drained, fertile soil.", "seasonal": "Requires bi-annual pruning (summer and winter) to control vigorous growth and promote flower buds."}, {"name": "Yucca", "latin": "Yucca filamentosa", "light": "Full sun.", "water": "Very well-drained soil; highly drought-tolerant once established.", "care": "Low maintenance. Remove dead or damaged leaves at the base. Wear gloves as leaf tips can be sharp.", "seasonal": "Evergreen. Spiky architectural rosettes provide year-round structure. Produces tall spikes of creamy-white bell flowers in summer."}], "Stone Bed": [{"name": "Aubrieta (Rock Cress)", "latin": "Aubrieta deltoidea", "light": "Full sun", "water": "Well-drained soil; drought-tolerant once established.", "care": "Shear back after blooming to keep it compact.", "seasonal": "Evergreen foliage. Bursts with purple flowers in spring."}, {"name": "Cabbage Tree", "latin": "Cordyline australis", "light": "Full sun to partial shade.", "water": "Moderate; drought-tolerant when mature.", "care": "Adaptable, but requires good drainage.", "seasonal": "Remove dead or yellowing leaves from the base of the tufts to maintain a tidy appearance."}, {"name": "Honeysuckle", "latin": "Lonicera", "light": "Full sun.", "water": "Adaptable to various soil types, provided they are moist and well-drained. Water regularly during the first growing season.", "care": "Prune after flowering to control growth and remove congested stems. Train new shoots along supports as required.", "seasonal": "Deciduous or semi-evergreen depending on the exact species. Characterised by rapid summer function mkSvgPlant(x,y,rx,ry,fill,op,name,label,fontSize){
  fontSize=fontSize||8;
  const esc=name.replace(/'/g,"\\'");
  let s='';
  if(ry)s+=`<ellipse cx="${x}" cy="${y}" rx="${rx}" ry="${ry}" fill="${fill}" opacity="${op}" cursor="pointer" onclick="showPlant('${esc}',currentBed)"/>`;
  else s+=`<circle cx="${x}" cy="${y}" r="${rx}" fill="${fill}" opacity="${op}" cursor="pointer" onclick="showPlant('${esc}',currentBed)"/>`;
  const lines=label.split('\n');
  lines.forEach((l,i)=>{s+=`<text x="${x}" y="${y+i*11-(lines.length-1)*5}" text-anchor="middle" font-family="DM Sans" font-size="${fontSize}" fill="#e4e0d6" pointer-events="none">${l}</text>`});
  return s;
}
function mkSvgRect(x,y,w,h,fill,op,name,label,rot){
  const esc=name.replace(/'/g,"\\'");
  let s=`<rect x="${x}" y="${y}" width="${w}" height="${h}" rx="4" fill="${fill}" opacity="${op}" cursor="pointer" onclick="showPlant('${esc}',currentBed)"/>`;
  if(rot)s+=`<text x="${x+w/2}" y="${y+h/2}" text-anchor="middle" dominant-baseline="central" font-family="DM Sans" font-size="8" fill="#e4e0d6" pointer-events="none" transform="rotate(${rot} ${x+w/2} ${y+h/2})">${label}</text>`;
  else s+=`<text x="${x+w/2}" y="${y+h/2}" text-anchor="middle" dominant-baseline="central" font-family="DM Sans" font-size="8" fill="#e4e0d6" pointer-events="none">${label}</text>`;
  return s;
}

let currentBed=null;
function showView(id){document.querySelectorAll('.view').forEach(v=>v.classList.remove('active'));document.getElementById(id).classList.add('active');window.scrollTo({top:0,behavior:'smooth'})}

function showBed(id){
currentBed=id;const z=ZONES[id];const plants=z.plantKey?(PLANTS[z.plantKey]||[]):[];const photos=PHOTOS[id]||[];
let h='<button class="back" onclick="showView(\'v-plan\')">&#8592; Back to plan</button>';
h+='<div class="bed-hdr"><h2>'+z.title+'</h2><div class="badge" style="background:'+z.color+'22;color:'+z.color+';border:1px solid '+z.color+'44">'+z.badge+'</div></div>';
h+='<div class="dims">'+z.dims.map(d=>'<div class="dim">'+d+'</div>').join('')+'</div>';
h+='<div class="bed-desc">'+z.desc+'</div>';
if(BED_MAPS[id]){h+='<h3 class="st">Plant map</h3><div class="map-card"><div class="map-hint">Click a plant to see its care guide</div>'+BED_MAPS[id]()+'</div>'}
if(plants.length>0){h+='<h3 class="st">All plants</h3><div class="plant-grid">';plants.forEach(p=>{h+='<div class="pc" onclick="showPlant(\''+p.name.replace(/'/g,"\\'")+'\',\''+id+'\')"><div class="pn">'+p.name+'</div><div class="pl">'+p.latin+'</div></div>'});h+='</div>'}
if(photos.length>0){h+='<h3 class="st">Photos - May 2026</h3><div class="gallery">';photos.forEach(p=>{h+='<div><img src="'+p+'" alt="'+z.title+'" onclick="openLB(this.src)" loading="lazy"/><div class="gd">May 2026</div></div>'});h+='</div>'}
h+='<h3 class="st">Growth timeline</h3><div class="tl">Monthly photos will appear here. Next update: June 2026</div>';
document.getElementById('v-bed').innerHTML=h;showView('v-bed')}

function showPlant(name,bedId){
const z=ZONES[bedId];const plants=PLANTS[z.plantKey]||[];const p=plants.find(x=>x.name===name);if(!p)return;
let h='<button class="back" onclick="showBed(\''+bedId+'\')">&#8592; Back to '+z.title+'</button>';
h+='<div class="pd"><h2>'+p.name+'</h2><div class="lt">'+p.latin+'</div>';
h+='<div class="ig">';
h+='<div class="ii"><h4>Light</h4><p>'+p.light+'</p></div>';
h+='<div class="ii"><h4>Watering & soil</h4><p>'+p.water+'</p></div>';
h+='<div class="ii"><h4>Care</h4><p>'+p.care+'</p></div>';
h+='<div class="ii"><h4>Seasonal changes</h4><p>'+p.seasonal+'</p></div>';
h+='</div></div>';
document.getElementById('v-plant').innerHTML=h;showView('v-plant')}

function openLB(s){document.getElementById('lb-img').src=s;document.getElementById('lb').classList.add('active')}
document.addEventListener('keydown',e=>{if(e.key==='Escape')document.getElementById('lb').classList.remove('active')});
</script>
